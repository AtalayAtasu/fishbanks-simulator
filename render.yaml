services:
  - type: web
    name: salmonrush
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    disk:
      name: salmonrush-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /var/data/salmonrush.sqlite
      - key: CLIENT_ORIGIN
        value: https://AtalayAtasu.github.io
